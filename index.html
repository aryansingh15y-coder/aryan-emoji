        <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stylish Name Generator</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    text-align: center;
}

/* animated neon bg */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #00f0ff, #ff00c8, #00ff88);
    animation: move 8s linear infinite;
    z-index: -1;
    opacity: 0.2;
}

@keyframes move {
    0% { transform: translate(0,0); }
    50% { transform: translate(-30%, -30%); }
    100% { transform: translate(0,0); }
}

.container {
    margin-top: 40px;
}

h1 {
    text-shadow: 0 0 10px cyan;
}

input {
    padding: 12px;
    width: 250px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: cyan;
    color: black;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 10px cyan;
}

.box {
    background: #111;
    margin: 10px auto;
    padding: 12px;
    border-radius: 10px;
    width: 80%;
    box-shadow: 0 0 10px #00f0ff;
    cursor: pointer;
}
</style>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>

<body>

<div class="container">
    <h1>вЪ° Stylish Name Generator вЪ°</h1>

    <input type="text" id="name" placeholder="Enter your name">
    <br><br>
    <button onclick="generate()">Generate</button>

    <div id="result"></div>
</div>

<script>
function generate() {
    let name = document.getElementById("name").value;

    let styles = [
        "гАО" + name + "гАП",
        "дєВ " + name + " дєВ",
        "ељ°" + name + "ељ°",
        "дЇЧ " + name + " дЇЧ",
        "кІБ" + name + "кІВ",
        "вШЕ" + name + "вШЕ",
        "вЬ¶ " + name + " вЬ¶",
        "вЩЫ " + name + " вЩЫ",
        "вШђ " + name + " вШђ",
        "гАЖ " + name + " гАЖ",
        "вЂЈ " + name + " вЂЄ",
        "вЧ• " + name + " вЧ§",
        "вЬІ " + name + " вЬІ",
        "вЪ° " + name + " вЪ°",
        "вЩ† " + name + " вЩ†",
        "вЬ™ " + name + " вЬ™",
        "вШ† " + name + " вШ†",
        "в¶њ " + name + " в¶њ",
        "вЮґ " + name + " вЮґ",
        "вЦСвЦТвЦУ " + name + " вЦУвЦТвЦС"
    ];

    let output = document.getElementById("result");
    output.innerHTML = "";

    styles.forEach(s => {
        let div = document.createElement("div");
        div.className = "box";
        div.innerText = s;

        div.onclick = () => {
            navigator.clipboard.writeText(s);
            alert("Copied: " + s);
        };

        output.appendChild(div);
    });
}
</script>
<script>
function generate() {
    let name = document.getElementById("name").value || "Aryan";

    let styles = [
        "гАО" + name + "гАП","дєВ " + name + " дєВ","ељ° " + name + " ељ°",
        "вШЕ " + name + " вШЕ","вЬ¶ " + name + " вЬ¶","вЩЫ " + name + " вЩЫ",
        "вЪ° " + name + " вЪ°","вОЭ " + name + " вО†","вЂЈ " + name + " вЂЄ",
        "џЭ " + name + " џЭ","вЧ• " + name + " вЧ§","вЬІ " + name + " вЬІ",
        "вЩХ " + name + " вЩХ","вЪФ " + name + " вЪФ","в¶њ " + name + " в¶њ"
    ];

    styles.sort(() => Math.random() - 0.5);

    let result = document.getElementById("result");
    result.innerHTML = "";

    styles.forEach(s => {
        let div = document.createElement("div");
        div.className = "box";
        div.innerText = s;
        result.appendChild(div);
    });
}
</script>

</html>
