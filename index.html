<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArYaN Emojis Picker</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(135deg, #ff00cc, #3333ff);
    color: white;
}

.container {
    padding: 20px;
}

input {
    padding: 12px;
    width: 260px;
    border-radius: 10px;
    border: none;
    margin: 5px;
}

button {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    background: #00ffcc;
    cursor: pointer;
}

.box {
    background: white;
    color: black;
    margin: 10px auto;
    padding: 10px;
    border-radius: 10px;
    width: 80%;
    cursor: pointer;
    font-size: 18px;
}

.emoji {
    font-size: 22px;
    margin: 6px;
    cursor: pointer;
    display: inline-block;
}

.emoji:hover {
    transform: scale(1.3);
}
</style>
</head>

<body>

<div class="container">
    <h1>🔥 ArYaN Emojis Picker 🔥</h1>
    <p>Type your name & copy stylish names + emojis 😎</p>

    <input type="text" id="nameInput" placeholder="Enter your name">
    <br>
    <button onclick="generate()">Generate Stylish Names</button>

    <div id="output"></div>

    <h2>😎 Emoji Picker</h2>
    <input type="text" id="search" placeholder="Search emoji..." onkeyup="searchEmoji()">
    <div id="emojis"></div>
</div>

<script>
// Stylish names
function generate() {
    let name = document.getElementById("nameInput").value;
    let output = document.getElementById("output");

    if(name === "") {
        alert("Enter your name!");
        return;
    }

    let styles = [
        "★彡 " + name + " 彡★",
        "꧁༒☬ " + name + " ☬༒꧂",
        "♛ " + name + " ♛",
        "🔥 " + name + " 🔥",
        "⚡ " + name + " ⚡",
        "💀 " + name + " 💀",
        "✨ " + name + " ✨",
        "😎 " + name + " 😎",
        "👑 " + name + " 👑"
    ];

    output.innerHTML = "";

    styles.forEach(s => {
        let div = document.createElement("div");
        div.className = "box";
        div.innerText = s;

        div.onclick = () => {
            navigator.clipboard.writeText(s);
            alert("Copied: " + s);
        };

        output.appendChild(div);
    });
}

// 500+ emojis
let emojiContainer = document.getElementById("emojis");
let emojis = [];

for(let i = 128512; i <= 129535; i++) {
    emojis.push(String.fromCodePoint(i));
}

function loadEmojis(list) {
    emojiContainer.innerHTML = "";
    list.forEach(e => {
        let span = document.createElement("span");
        span.className = "emoji";
        span.innerText = e;

        span.onclick = () => {
            navigator.clipboard.writeText(e);
            alert("Copied: " + e);
        };

        emojiContainer.appendChild(span);
    });
}

// Search emoji
function searchEmoji() {
    let val = document.getElementById("search").value;
    let filtered = emojis.filter(e => e.includes(val));
    loadEmojis(filtered);
}

// Load all emojis on start
loadEmojis(emojis);
</script>

</body>
  </html>
