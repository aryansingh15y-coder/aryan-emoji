        <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stylish Name Generator</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    color: white;
    text-align: center;
}

/* animated neon bg */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, #00f0ff, #ff00c8, #00ff88);
    animation: move 8s linear infinite;
    z-index: -1;
    opacity: 0.2;
}

@keyframes move {
    0% { transform: translate(0,0); }
    50% { transform: translate(-30%, -30%); }
    100% { transform: translate(0,0); }
}

.container {
    margin-top: 40px;
}

h1 {
    text-shadow: 0 0 10px cyan;
}

input {
    padding: 12px;
    width: 250px;
    border-radius: 10px;
    border: none;
}

button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: cyan;
    color: black;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 0 10px cyan;
}

.box {
    background: #111;
    margin: 10px auto;
    padding: 12px;
    border-radius: 10px;
    width: 80%;
    box-shadow: 0 0 10px #00f0ff;
    cursor: pointer;
}
</style>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
</head>

<body>

<div class="container">
    <h1>вҡЎ Stylish Name Generator вҡЎ</h1>

    <input type="text" id="name" placeholder="Enter your name">
    <br><br>
    <button onclick="generate()">Generate</button>

    <div id="result"></div>
</div>

<script>
function generate() {
    let name = document.getElementById("name").value;

    let styles = [
        "гҖҺ" + name + "гҖҸ",
        "д№Ӯ " + name + " д№Ӯ",
        "еҪЎ" + name + "еҪЎ",
        "дә— " + name + " дә—",
        "к§Ғ" + name + "к§Ӯ",
        "вҳ…" + name + "вҳ…",
        "вңҰ " + name + " вңҰ",
        "вҷӣ " + name + " вҷӣ",
        "вҳ¬ " + name + " вҳ¬",
        "гҖҶ " + name + " гҖҶ",
        "в«· " + name + " в«ё",
        "в—Ҙ " + name + " в—Ө",
        "вң§ " + name + " вң§",
        "вҡЎ " + name + " вҡЎ",
        "вҷ  " + name + " вҷ ",
        "вңӘ " + name + " вңӘ",
        "вҳ  " + name + " вҳ ",
        "вҰҝ " + name + " вҰҝ",
        "вһ¶ " + name + " вһ¶",
        "в–‘в–’в–“ " + name + " в–“в–’в–‘"
    ];

    let output = document.getElementById("result");
    output.innerHTML = "";

    styles.forEach(s => {
        let div = document.createElement("div");
        div.className = "box";
        div.innerText = s;

        div.onclick = () => {
            navigator.clipboard.writeText(s);
            alert("Copied: " + s);
        };

        output.appendChild(div);
    });
}
</script>
<script>
function generate() {
    let name = document.getElementById("name").value || "Aryan";

    let styles = [
        "гҖҺ" + name + "гҖҸ","д№Ӯ " + name + " д№Ӯ","еҪЎ " + name + " еҪЎ",
        "вҳ… " + name + " вҳ…","вңҰ " + name + " вңҰ","вҷӣ " + name + " вҷӣ",
        "вҡЎ " + name + " вҡЎ","вҺқ " + name + " вҺ ","в«· " + name + " в«ё",
        "Ық " + name + " Ық","в—Ҙ " + name + " в—Ө","вң§ " + name + " вң§",
        "вҷ• " + name + " вҷ•","вҡ” " + name + " вҡ”","вҰҝ " + name + " вҰҝ"
    ];

    styles.sort(() => Math.random() - 0.5);

    let result = document.getElementById("result");
    result.innerHTML = "";

    styles.forEach(s => {
        let div = document.createElement("div");
        div.className = "box";
        div.innerText = s;
        result.appendChild(div);
    });
}
</script>
</body>
</html>
